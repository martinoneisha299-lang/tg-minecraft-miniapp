<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#12050f" />
  <title>Pixel Games Mini App</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preload" as="image" href="assets/bg.jpg" />
  <link rel="preload" as="image" href="assets/minecraft-icon.png" />
  <link rel="stylesheet" href="styles.css?v=3" />
</head>
<body>
  <main class="app" id="app">
    <div class="bg" aria-hidden="true"></div>
    <div class="vignette" aria-hidden="true"></div>
    <div class="noise" aria-hidden="true"></div>
    <canvas id="petals" class="petals" aria-hidden="true"></canvas>

    <section class="topbar" aria-label="Верхняя панель">
      <div class="brand-chip">
        <span class="brand-cube" aria-hidden="true"></span>
        <span>PIXEL DROP</span>
      </div>
      <button class="sound-btn" id="fxBtn" type="button" aria-label="Эффекты">
        <span></span><span></span><span></span>
      </button>
    </section>

    <section class="hero">
      <h1>Лаунчер для iOS</h1>
      <p>Выбери версию для установки на айфон</p>
    </section>

    <section class="games-panel" aria-label="Список версий">
      <div class="panel-head">
        <div>
          <span class="tiny-label">Список версий</span>
          <h2>Доступно сейчас</h2>
        </div>
        <span class="counter">1</span>
      </div>

      <button class="game-card" id="openInstall" type="button">
        <div class="game-icon-wrap">
          <img src="assets/minecraft-icon.png" class="game-icon" alt="Minecraft" />
          <span class="icon-glow"></span>
        </div>
        <div class="game-info">
          <strong>Minecraft</strong>
          <span>26.21</span>
        </div>
        <div class="game-action" aria-hidden="true">›</div>
      </button>
    </section>
  </main>

  <div class="modal-layer" id="modalLayer" aria-hidden="true">
    <div class="modal-backdrop" id="closeModal"></div>
    <section class="install-sheet" id="installSheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="grabber"></div>

      <div class="state state-start is-active" data-state="start">
        <div class="mc-axo-bucket">
          <svg class="mc-axo-svg" viewBox="0 0 128 128" shape-rendering="crispEdges">
            <!-- bubbles -->
            <rect class="axo-bubble b1" x="31" y="25" width="4" height="4"/>
            <rect class="axo-bubble b2" x="95" y="18" width="3" height="3"/>
            <rect class="axo-bubble b3" x="84" y="35" width="3" height="3"/>

            <!-- bucket shadow -->
            <rect x="35" y="108" width="58" height="6" fill="#000000" opacity=".22"/>

            <!-- bucket back rim -->
            <rect x="24" y="55" width="80" height="8" fill="#cbb7db"/>
            <rect x="20" y="63" width="88" height="8" fill="#9f8bb7"/>

            <!-- water -->
            <g class="axo-water">
              <rect x="29" y="58" width="70" height="5" fill="#7bb8ff"/>
              <rect x="36" y="55" width="19" height="3" fill="#b8dcff"/>
              <rect x="68" y="56" width="20" height="3" fill="#b8dcff"/>
              <rect x="52" y="62" width="22" height="3" fill="#4f86df"/>
            </g>

            <!-- axolotl body/head -->
            <g class="axo-body">
              <!-- left gills -->
              <g class="gill-left">
                <rect x="30" y="24" width="9" height="7" fill="#d83ca6"/>
                <rect x="23" y="18" width="8" height="7" fill="#e848ac"/>
                <rect x="22" y="34" width="9" height="7" fill="#e848ac"/>
                <rect x="30" y="41" width="8" height="7" fill="#d83ca6"/>
              </g>

              <!-- right gills -->
              <g class="gill-right">
                <rect x="89" y="24" width="9" height="7" fill="#d83ca6"/>
                <rect x="98" y="18" width="8" height="7" fill="#e848ac"/>
                <rect x="99" y="34" width="9" height="7" fill="#e848ac"/>
                <rect x="90" y="41" width="8" height="7" fill="#d83ca6"/>
              </g>

              <!-- head -->
              <rect x="37" y="22" width="54" height="35" fill="#ffd1e8"/>
              <rect x="37" y="45" width="54" height="12" fill="#f27bc1"/>
              <rect x="39" y="23" width="50" height="6" fill="#ffe0ef"/>

              <!-- face -->
              <rect class="axo-eye" x="45" y="36" width="7" height="7" fill="#241241"/>
              <rect class="axo-eye" x="76" y="36" width="7" height="7" fill="#241241"/>
              <rect x="57" y="38" width="15" height="5" fill="#f5a3cc"/>

              <!-- cheeks / side pixels -->
              <rect x="33" y="48" width="7" height="7" fill="#ef5caf"/>
              <rect x="88" y="48" width="7" height="7" fill="#ef5caf"/>

              <!-- body inside bucket -->
              <rect x="46" y="57" width="36" height="24" fill="#f29bd0"/>
              <rect x="55" y="62" width="18" height="21" fill="#2e6eea"/>
              <rect x="47" y="57" width="34" height="6" fill="#ffb4dc"/>

              <!-- legs -->
              <g class="leg leg-left">
                <rect x="41" y="66" width="8" height="20" fill="#ffd1e8"/>
                <rect x="46" y="84" width="8" height="7" fill="#ff75b8"/>
              </g>

              <g class="leg leg-right">
                <rect x="79" y="66" width="8" height="20" fill="#ffd1e8"/>
                <rect x="74" y="84" width="8" height="7" fill="#ff75b8"/>
              </g>
            </g>

            <!-- bucket front -->
            <rect x="26" y="68" width="76" height="8" fill="#b69ccc"/>
            <rect x="30" y="76" width="68" height="32" fill="#a88bc4"/>
            <rect x="35" y="78" width="11" height="29" fill="#d8c9e8"/>
            <rect x="82" y="78" width="10" height="29" fill="#7c6996"/>
            <rect x="43" y="78" width="39" height="31" fill="#b69ccc"/>
            <rect x="50" y="104" width="34" height="5" fill="#8c76a8"/>

            <!-- bucket front rim highlight -->
            <rect x="24" y="65" width="80" height="5" fill="#e4d6ef"/>
            <rect x="33" y="66" width="24" height="2" fill="#ffffff" opacity=".7"/>
            <rect x="72" y="66" width="20" height="2" fill="#b59bc9"/>

            <!-- front water pixels -->
            <rect class="front-splash s1" x="52" y="62" width="8" height="4" fill="#80bdff"/>
            <rect class="front-splash s2" x="70" y="63" width="8" height="4" fill="#5b94ee"/>
          </svg>
        </div>
        <p class="sheet-overline">Готово к установке</p>
        <h2 id="sheetTitle">Minecraft</h2>
        <p class="sheet-copy">Нажми кнопку ниже и дождись загрузки</p>
        <button class="install-btn" id="installBtn" type="button">
          <span class="btn-light"></span>
          <span>Установить</span>
        </button>
      </div>

      <div class="state state-loading" data-state="loading">
        <div class="ios-loader">
          <svg class="ring" viewBox="0 0 100 100" aria-hidden="true">
            <circle class="ring-track" cx="50" cy="50" r="42"></circle>
            <circle class="ring-progress" id="ringProgress" cx="50" cy="50" r="42"></circle>
          </svg>
          <div class="spinner"><i></i></div>
          <strong id="percentText">0%</strong>
        </div>
        <h2>Установка</h2>
        <p class="sheet-copy" id="loadingText">Подготовка файлов...</p>
        <div class="progress-shell">
          <div class="progress-fill" id="progressFill"></div>
        </div>
      </div>

      <div class="state state-success" data-state="success">
        <div class="success-mark" aria-hidden="true">
          <svg viewBox="0 0 96 96">
            <path d="M28 49.5 41 62.5 69 34.5" />
          </svg>
        </div>
        <p class="sheet-overline">Завершено</p>
        <h2>Успешно</h2>
        <p class="sheet-copy">Готово. Окно можно закрыть или оставить как финальный экран.</p>
        <button class="done-btn" id="doneBtn" type="button">Готово</button>
      </div>
    </section>
  </div>

  <script src="script.js?v=3"></script>
</body>
</html>
